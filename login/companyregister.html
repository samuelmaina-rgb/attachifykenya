<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttachifyKenya</title>
<link rel="stylesheet" href="../css/loginstyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="register-body">

    
    <header>
        <div class="logo"><img src="../assets/newlogo.png" alt="logo"></div>
         <H3>ATTACHIFYKENYA</H3>

        <nav>
            <a href="../index.html">Home</a>
            <a href="../about.html">About Us </a>
            <a href="../contact.html">Contact Us</a>
            <a href="../login.html">Log In</a>
            <button>☰</button>
        </nav>
    </header>
    <main class="register-main">
        <div class="register-head">
            <h1>Register Your Company</h1>
            <p>Create a company account and start posting attachment opportunities.</p>
        
        <section class="register-form">

    <form>

        <input type="text" placeholder="Company Name" required>

        <input type="text" placeholder="Industry" required>

        <input type="text" placeholder="Contact Person" required>

        <input type="email" placeholder="Company Email" required>

        <input type="tel" placeholder="Phone Number" required>

        <input type="text" placeholder="Company Location" required>

        <input type="url" placeholder="Company Website (Optional)">

        <input type="password" placeholder="Create Password" required>

        <input type="password" placeholder="Confirm Password" required>

        <button type="submit">Register Company</button>

    </form>

</section>
        </div>
    </main>
    <footer>

    <div class="footer-logo">
        <img src="../assets/newlogo.png" alt="Attachify Kenya Logo">
       
    </div>

    <div class="footer-text">
        <p><strong>Attachify Kenya</strong></p>
        <p>Find. Attach. Grow.</p>
    </div>

    <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="footer-copy">
        <p>© 2026 Attachify Kenya</p>
    </div>

</footer>
</body>
 
</html>
