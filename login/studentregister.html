    <header>
        <div class="logo"><img src="../assets/logo.png" alt="logo"></div>

            <a href="../index.html">Home</a>

    <main class="register-main">
        <div class="register-head">
            <h1>Create Student Profile</h1>

    <p>Complete your profile to start applying for attachment opportunities.</p>
    <section class="register-form">

    <form>

        <input type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Email Address" required>

        <input type="tel" placeholder="Phone Number" required>

        <input type="text" placeholder="University / College" required>

        <input type="text" placeholder="Course" required>

        <select required>
            <option value="">Year of Study</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
            <option>5th Year</option>
        </select>

        <input type="text" placeholder="County" required>

        <input type="password" placeholder="Create Password" required>

        <input type="password" placeholder="Confirm Password" required>

        <button type="submit">Create Profile</button>

    </form>

</section>

        </div>
        
    </main>
    <footer>

    <div class="footer-logo">
        <img src="../assets/logo.png" alt="Attachify Kenya Logo">
    </div>

        <p>Find. Attach. Grow.</p>
    </div>
